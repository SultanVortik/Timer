<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/timer.css">
    <link rel="stylesheet" href="css/set-time.css">
    <title>Timer</title>
</head>
<body>
    <header class="header">
        <a href="index.html" class="header_title">Timer</a>
        <div class="header_buttons" >
            <a href="pomodoro-timer.html">
                <img src="src/img/pomodoro-technique.png" alt="" title="Помодоро таймер">
            </a>
            <a href="">
                <img src="src/img/moon.png" alt="" title="Переключить тему">
            </a>
            <a href="">
                <img src="src/img/gear.png" alt="" title="Настройки">
            </a>
        </div>
    </header>
    <main class="main">
        <div class="main_input-time-container">   
            <input type="number" id="hours" required max="" placeholder="Часы" class="main_input">
            <input type="number" id="minutes" required max="60" placeholder="Минуты" class="main_input">
            <input type="number" id="seconds" required max="60" placeholder="Секунды" class="main_input">
        </div>
        <div class="main_set-time-buttons">
            <button class="main_button margin-right set-timer" id="set-timer-btn">Start</button>
            <button class="main_button cancel">Cancel</button>
        </div>
    </main>
    <footer class="footer">
        <div class="footer_info">
            <a href="https://github.com/SultanVortik/Timer">GitHub</a>
            <span>By Magomedov Sultan</span>
        </div>
    </footer>
    <script src="js/set_time.js"></script>
</body>
</html>
