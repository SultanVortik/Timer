<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timer</title>
    <link rel="stylesheet" href="css/timer.css">
</head>
<body>
    <header class="header">
        <a href="index.html" class="header_title">Timer</a>
        <div class="header_buttons" >
            <a href="pomodoro-timer.html">
                <img src="src/img/pomodoro-technique.png" alt="" title="Помодоро таймер">
            </a>
            <a href="">
                <img src="src/img/moon.png" alt="" title="Переключить тему">
            </a>
            <a href="">
                <img src="src/img/gear.png" alt="" title="Настройки">
            </a>
        </div>
    </header>
    <main class="main">
        <div class="main_timer">
            <span id="current-time">4:60:50</span>
        </div>
        <div class="main_timer-buttons">
            <button class="main_button start">
                <img class="main_button-icon" src="src/img/play.png" alt="">
                Start
            </button>
            <button class="main_button pause">
                <img class="main_button-icon" src="src/img/pause-button.png" alt="">
                Pause
            </button>
            <button class="main_button reset">
                <img class="main_button-icon" src="src/img/reset.png" alt="">
                Reset
            </button>
        </div>
    </main>
    <footer class="footer">
        <div class="footer_info">
            <a href="https://github.com/SultanVortik/Timer">GitHub</a>
            <span>By Magomedov Sultan</span>
        </div>
    </footer>
    <script src="js/timer.js"></script>
</body>
</html>
